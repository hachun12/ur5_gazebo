controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ur5_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    robotiq_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

ur5_arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    open_loop_control: false

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      shoulder_pan_joint:
        trajectory: 0.1
        goal: 0.1
      shoulder_lift_joint:
        trajectory: 0.1
        goal: 0.1
      elbow_joint:
        trajectory: 0.1
        goal: 0.1
      wrist_1_joint:
        trajectory: 0.1
        goal: 0.1
      wrist_2_joint:
        trajectory: 0.1
        goal: 0.1
      wrist_3_joint:
        trajectory: 0.1
        goal: 0.1

robotiq_gripper_controller:
  ros__parameters:
    joints:
      - robotiq_85_left_knuckle_joint
      - robotiq_85_right_knuckle_joint
      - robotiq_85_left_inner_knuckle_joint
      - robotiq_85_right_inner_knuckle_joint
      - robotiq_85_left_finger_tip_joint
      - robotiq_85_right_finger_tip_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      robotiq_85_left_knuckle_joint:
        trajectory: 0.08
        goal: 0.04
      robotiq_85_right_knuckle_joint:
        trajectory: 0.08
        goal: 0.04
      robotiq_85_left_inner_knuckle_joint:
        trajectory: 0.08
        goal: 0.04
      robotiq_85_right_inner_knuckle_joint:
        trajectory: 0.08
        goal: 0.04
      robotiq_85_left_finger_tip_joint:
        trajectory: 0.08
        goal: 0.04
      robotiq_85_right_finger_tip_joint:
        trajectory: 0.08
        goal: 0.04
