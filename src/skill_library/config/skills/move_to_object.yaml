skill_id: move_to_object
description: Move gripper_tcp down near an object using a short MoveIt Cartesian segment.
category: motion
parameters:
  object:
    type: string
    required: true
  z_offset:
    type: number
    required: false
preconditions:
  - object_exists
  - gripper_tcp_above_object
  - move_group_running
effects:
  - gripper_tcp_near_object
motion_requirements:
  planner: moveit_cartesian_path
ros_interfaces:
  services:
    - /compute_cartesian_path
    - /gazebo/get_entity_state
  actions:
    - /execute_trajectory
failure_modes:
  - object_missing
  - move_group_unavailable
  - planning_failed
  - execution_failed
recovery_policy: move_above_object_then_retry
